name: Build and Push Container

on:
  push:
    branches:
      - main
      - testing
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-db-setup:
    if: github.ref == 'refs/heads/testing'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erwin_hatchery
          POSTGRES_USER: erwin_hatchery
          POSTGRES_PASSWORD: erwin_hatchery
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erwin_hatchery -d erwin_hatchery"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deterministic migration and seed (testing)
        env:
          DATABASE_URL: postgres://erwin_hatchery:erwin_hatchery@localhost:5432/erwin_hatchery
        run: |
          pnpm db:migrate
          pnpm db:seed

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/auranord/erwin-hatchery
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=testing,enable=${{ github.ref == 'refs/heads/testing' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
