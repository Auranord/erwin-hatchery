services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erwin-hatchery-api-local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://erwin_hatchery:change_me@postgres:5432/erwin_hatchery
      PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: erwin-hatchery-postgres-local
    environment:
      POSTGRES_DB: erwin_hatchery
      POSTGRES_USER: erwin_hatchery
      POSTGRES_PASSWORD: change_me
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erwin_hatchery -d erwin_hatchery']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
