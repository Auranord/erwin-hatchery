# TrueNAS SCALE example based on a working `main` deployment.
#
# This is intentionally a single-environment file (one app instance per YAML).
# Copy and adjust for testing/dev as needed.
#
# IMPORTANT:
# - Replace all CHANGE_ME placeholders.
# - Prefer TrueNAS app secrets for sensitive values.
# - Keep database credentials identical across POSTGRES_* and DATABASE_URL.

name: erwin-hatchery-main

services:
  api:
    # For production you can use :main or :stable depending on your workflow.
    image: ghcr.io/auranord/erwin-hatchery:main
    container_name: erwin-hatchery-api-main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      TZ: Europe/Berlin

      # Keep credentials/db-name in sync with postgres service below.
      DATABASE_URL: "postgres://POSTGRES_USER:CHANGE_ME_LONG_PASSWORD@postgres:5432/POSTGRES_DB"

      # Mode A (all-in-one): app + API on same host.
      # For Cloudflare Pages mode use:
      #   PUBLIC_APP_URL=https://hatchery.auranord.net
      #   PUBLIC_API_URL=https://api.hatchery.auranord.net
      #   CORS_ORIGIN=https://hatchery.auranord.net
      PUBLIC_APP_URL: "https://hatchery.auranord.net"
      PUBLIC_API_URL: "https://hatchery.auranord.net"
      CORS_ORIGIN: "https://hatchery.auranord.net"

      # Twitch/OAuth/EventSub values
      TWITCH_CLIENT_ID: "CHANGE_ME_TWITCH_CLIENT_ID"
      TWITCH_CLIENT_SECRET: "CHANGE_ME_TWITCH_CLIENT_SECRET"
      TWITCH_BROADCASTER_ID: "CHANGE_ME_TWITCH_BROADCASTER_ID"
      TWITCH_CHANNEL_POINT_REWARD_ID: "CHANGE_ME_TWITCH_CHANNEL_POINT_REWARD_ID"
      TWITCH_EVENTSUB_SECRET: "CHANGE_ME_EVENTSUB_SECRET"

      # App secrets
      SESSION_SECRET: "CHANGE_ME_SESSION_SECRET"
      OVERLAY_SECRET: "CHANGE_ME_OVERLAY_SECRET"

    # Choose host port for this app instance.
    ports:
      - "3010:3000"

    networks:
      - erwin_internal

    volumes:
      # Production dataset root. For non-prod consider /mnt/fast/config/erwin-hatchery-test
      - /mnt/fast/config/erwin-hatchery/uploads:/app/uploads
      - /mnt/fast/config/erwin-hatchery/logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: erwin-hatchery-postgres-main
    pull_policy: always
    restart: unless-stopped

    environment:
      POSTGRES_DB: POSTGRES_DB
      POSTGRES_USER: POSTGRES_USER
      POSTGRES_PASSWORD: "CHANGE_ME_LONG_PASSWORD"

    volumes:
      - /mnt/fast/config/erwin-hatchery/postgres:/var/lib/postgresql/data

    networks:
      - erwin_internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U POSTGRES_USER -d POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  erwin_internal:
    name: erwin_main_internal
